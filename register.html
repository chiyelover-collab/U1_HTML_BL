<!DOCTYPE html>
<html lang = "es">
    <head>
    <meta charset = "UTF-8">    
    <title> Registrate </title>
    <link rel="stylesheet" href = "CSS/style_page.css" />
    </head>
    <header> 
        <a href = "index.html">
            <button class = "class_botton1"> Volver a Login </button>
        </a>
    </header>
    <body class = "class_body">
        <form class = "class_form2" action = "/register" method = "post">
        <h2 class= "class_h2"> Regístrate </h2>
        <label class = "class_label" for = "email"> Email: </label>
        <input class = "class_input" type = "text" id = "email" name = "email" required/>
    </br>
        <label class = "class_label" for = "contrasena"> Contraseña: </label>
        <input class = "class_input" type = "password" id = "contrasena" name = "contrasena" required/>
    </br>
        <label class = "class_label" for = "nombre"> Nombre: </label>
        <input class = "class_input" type = "text" id = "nombre" name = "nombre"/>
    </br>
        <label class = "class_label" for = "edad"> Edad: </label>
        <input class = "class_input" type = "text" id = "edad" name = "edad"/>
    </br>   
        <label class = "class_label" for = "deporte"> ¿Practicas deporte?: </label>
        <input class = "class_input" type = "text" id = "deporte" name = "deporte"/>
    </br>
        <label class = "class_label" for = "deporte"> Si practicas un deporte, ¿cuál es?: </label>
        <input class = "class_input" type = "text" id = "deporte" name = "deporte"/>
    </br>
        <label class = "class_label" for = "deporte"> ¿Cual es tu objetivo?:</label>
        <input class = "class_input" type = "text" id = "deporte" name = "deporte"/>
    </br>
        <label class = "class_label" for = "deporte"> Nivel: </label>
    </br>
        <input type="radio" id="html" name= "nivel" value="Basico">
        <label class = "class_label" for="html">Basico</label>
    </br>
        <input type="radio" id="css" name="nivel" value="Intermedio">
        <label class = "class_label" for="css">Intermedio</label>
    </br>
        <input type="radio" id="javascript" name="nivel" value="Avanzado">
        <label class = "class_label" for="javascript">Avanzado</label>
    </br>
        <button class = "class_botton2" type = "submit"> Registrarse </button>
    </form>
    </body>
</html>
