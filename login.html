<!DOCTYPE html>
<html lang = "es">
<head>
    <meta charset = "UTF-8">    
    <title> Login </title>
    <link rel="stylesheet" href = "CSS/styles.css" />
</head>
    <header>
        <a href="index.html"><button class = "class_button3"> Volver Atrás </button></a>
    </header>
    <body class = "class_body">
    <form class = "class_form1" action = "/submit_login" method = "post">
        <div class = "class_div3">
            <img class = "class_img1" src = "Recursos visuales/logo_empresa_letra_v1.png" alt = "Logo de la empresa"/>
        </div>
        <h1 class= "class_h3"> ¡Bienvenido al Sportsclub! </h1>
        <div class = "class_div4">
            <label class = "class_label" for = "email"> Email: </label>
            <input class = "class_input" type = "text" id = "email" name = "email" placeholder= "Ingresa tu correo"/>
            <label class = "class_label" for = "contrasena"> Contraseña: </label>
            <input class = "class_input" type = "password" id = "contrasena" name = "contrasena" placeholder= "Ingresa tu contraseña"/>
            <button id = "btnIngresar" class = "class_botton" type = "button"> Ingresar </button>
            <hr>        
        </div>
        <div>
            <p id="mensajeError" class = "class_men_error"></p>
        </div>
        <div class = "class_div5">
            <a class = "class_a" href = "recover.html"> ¿Olvidaste tu contraseña? </a>
        </br>
            <a class = "class_a1" href = "register.html"> Registrate </a>
        </div>
    </form>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe" crossorigin="anonymous">   
    </script>
    <script src = "javascript/sportclub_login.js"></script>
    </body>
</html>
